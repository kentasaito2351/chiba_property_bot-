name: Daily Property Scan

on:
  schedule:
    # Run every 5 minutes (Maximum practical frequency without hitting API/GitHub limits)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py

      - name: Commit Price History
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update price history [skip ci]"
          file_pattern: price_history.json
